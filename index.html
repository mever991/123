<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList — Задание №1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="todo-container">
        <h1>
             todo
            <span id="task-counter">0</span>
        </h1>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Новая задача..." autofocus>
            <button id="addBtn"> Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Завершённые</button>
        </div>

        <ul class="task-list" id="taskList">
            <li class="empty-message">Нет задач. Добавьте первую!</li>
        </ul>

        <div class="task-footer">
            <span id="info-text">Всего: 0</span>
            <button class="clear-all-btn" id="clearCompletedBtn">Очистить завершённые</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
